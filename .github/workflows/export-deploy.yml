# 部署复习小站到 GitHub Pages
# 触发方式：
#   - push 到 main（site/ 或 cards.json 变化时）
#   - workflow_dispatch（手动触发）
name: Deploy Review Site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'scripts/review.py'
      - '.github/workflows/export-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'study-vault bot'
          user_email: 'bot@study-vault'
