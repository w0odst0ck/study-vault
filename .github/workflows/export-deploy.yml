# 导出卡片数据 + 部署复习小站到 GitHub Pages
# 触发方式：
#   - push 到 main（knowledge/ review/ cards.json site/ 变化时）
#   - workflow_dispatch（手动触发）
name: Export & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'knowledge/**'
      - 'review/**'
      - 'scripts/review.py'
      - 'site/**'
      - '.github/workflows/export-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Export cards.json
        run: python3 scripts/review.py export

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'study-vault bot'
          user_email: 'bot@study-vault'
